---
name: Release
concurrency: changelog
on:
  release:
    types: [released]
permissions:
  contents: read
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: {python-version: '3.12'}
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false
      - name: Sync dependencies
        run: uv sync --frozen --group dev
      - name: Bump changelog and version files
        id: release
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          uv run changelogmanager release \
            --override-version "$VERSION" \
            --bump-versions \
            --yes
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Commit and push bump branch
        id: push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          BRANCH="release/bump-${RELEASE_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add CHANGELOG.md pyproject.toml notispf/__init__.py
          git add -u
          if git diff --cached --quiet; then
            echo "::warning::No files changed after release --bump-versions; is the version already bumped?"
            exit 1
          fi
          git commit -m "chore: release ${RELEASE_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          REMOTE_SHA="$(git ls-remote --heads origin "${BRANCH}" | awk '{print $1}')"
          if [ -n "${REMOTE_SHA}" ]; then
            git push \
              --force-with-lease="refs/heads/${BRANCH}:${REMOTE_SHA}" \
              origin \
              "HEAD:refs/heads/${BRANCH}"
          else
            git push origin "HEAD:refs/heads/${BRANCH}"
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          BASE_BRANCH: ${{ github.event.release.target_commitish }}
          REPO: ${{ github.repository }}
          BUMP_BRANCH: ${{ steps.push.outputs.branch }}
        run: |
          uv run changelogmanager github-pr \
            --repository "${REPO}" \
            --head "${BUMP_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --title "chore: release ${RELEASE_VERSION}" \
            --body "$(cat <<EOF
          Automated release PR for **${RELEASE_VERSION}**.
          Changes:
          - \`CHANGELOG.md\`: promoted \`[Unreleased]\` to \`${RELEASE_VERSION}\`
          - \`pyproject.toml\`: version bumped to \`${RELEASE_VERSION}\`
          - Source version strings updated to \`${RELEASE_VERSION}\`
          This PR was opened automatically by the Release workflow.
          Merge it once the PyPI publish below succeeds.
          EOF
          )"

  # ── Linux: AppImage + curses binary ────────────────────────────────────────
  build-linux:
    needs: [bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[qt]" pyinstaller

      - name: Build Qt binary (onedir — required for AppImage)
        run: |
          pyinstaller --onedir --name notispf-qt \
            --collect-all PyQt6 \
            notispf/_qt_main.py

      - name: Build curses binary
        run: pyinstaller --onefile --name notispf-linux notispf/__main__.py

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/notispf-qt/* AppDir/usr/bin/
          cp assets/icon.png AppDir/notispf-qt.png
          cp packaging/notispf-qt.desktop AppDir/notispf-qt.desktop
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "$HERE/usr/bin/notispf-qt" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir notispf-qt-x86_64.AppImage

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp notispf-qt-x86_64.AppImage release/
          cp dist/notispf-linux release/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: linux
          path: release/

  # ── macOS: curses binary ───────────────────────────────────────────────────
  build-macos:
    needs: [bump]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build curses binary
        run: pyinstaller --onefile --name notispf-macos notispf/__main__.py

      - name: Collect release artifacts
        run: |
          mkdir -p release
          cp dist/notispf-macos release/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: macos
          path: release/

  # ── Windows: installer + curses .exe ───────────────────────────────────────
  build-windows:
    needs: [bump]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[qt]" pyinstaller windows-curses

      - name: Build Qt .exe
        run: pyinstaller --onefile --windowed --name notispf-qt --icon assets/icon.ico --collect-all PyQt6 notispf/_qt_main.py

      - name: Build curses .exe
        run: pyinstaller --onefile --name notispf-windows --collect-all windows_curses notispf/__main__.py

      - name: Create installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install innosetup --no-progress -y
          $version = "${{ needs.bump.outputs.version }}"
          iscc /DMyAppVersion="$version" packaging\windows-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item Output\notispf-qt-setup.exe release\
          Copy-Item dist\notispf-windows.exe release\

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: windows
          path: release/

  # ── Attach binaries to the GitHub Release ──────────────────────────────────
  attach-release-assets:
    needs: [bump, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/notispf-qt-x86_64.AppImage \
            dist/notispf-linux \
            dist/notispf-macos \
            dist/notispf-qt-setup.exe \
            dist/notispf-windows.exe \
            --repo "${{ github.repository }}" \
            --clobber

  # ── Update PKGBUILD ─────────────────────────────────────────────────────────
  update-pkgbuild:
    needs: [bump, attach-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - name: Compute sha256 of notispf-linux
        id: vars
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/notispf-linux"
          HASH=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        env:
          VERSION: ${{ needs.bump.outputs.version }}
          HASH: ${{ steps.vars.outputs.hash }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${HASH}')/" packaging/PKGBUILD

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/PKGBUILD
          git diff --cached --quiet || git commit -m "chore: update PKGBUILD for ${{ needs.bump.outputs.version }}"
          git push origin "${{ needs.bump.outputs.branch }}"

  # ── PyPI ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [bump, update-pkgbuild]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Verify dist version matches release
        env:
          EXPECTED: ${{ needs.bump.outputs.version }}
        run: |
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "::error::No wheel found in dist/"
            exit 1
          fi
          if ! echo "$WHEEL" | grep -q "${EXPECTED}"; then
            echo "::error::Wheel ${WHEEL} does not contain expected version ${EXPECTED}"
            exit 1
          fi
          echo "Verified: ${WHEEL} matches version ${EXPECTED}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pypi-packages
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/notispf
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pypi-packages
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          verbose: 'true'
